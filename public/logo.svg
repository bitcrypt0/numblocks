<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="NumberBlocks logo">
  <!-- Back block: amber, carries 0, tilted +8deg -->
  <g transform="rotate(8 86 88)">
    <rect x="54" y="61" width="64" height="64" rx="16" fill="#b97308"/>
    <rect x="54" y="56" width="64" height="64" rx="16" fill="#f5a623"/>
    <text x="86" y="89" font-family="'Spline Sans Mono', ui-monospace, Menlo, Consolas, monospace" font-size="44" font-weight="700" text-anchor="middle" dominant-baseline="central" fill="#2c1d00">0</text>
  </g>
  <!-- Front block: brand blue, carries 1, tilted -6deg -->
  <g transform="rotate(-6 50 54)">
    <rect x="8" y="18" width="84" height="84" rx="20" fill="#1d3f96"/>
    <rect x="8" y="12" width="84" height="84" rx="20" fill="#2c5fe0"/>
    <text x="50" y="55" font-family="'Spline Sans Mono', ui-monospace, Menlo, Consolas, monospace" font-size="58" font-weight="700" text-anchor="middle" dominant-baseline="central" fill="#ffffff">1</text>
  </g>
</svg>
